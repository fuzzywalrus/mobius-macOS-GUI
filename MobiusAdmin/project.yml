name: MobiusAdmin
options:
  bundleIdPrefix: com.mobius
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"
targets:
  MobiusAdmin:
    type: application
    platform: macOS
    sources:
      - path: MobiusAdmin
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobius.MobiusAdmin
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "0.0.3"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSMainNibFile: ""
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: $(CODE_SIGN_IDENTITY)
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: MobiusAdmin/Resources/MobiusAdmin.entitlements
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          CODE_SIGN_ENTITLEMENTS: MobiusAdmin/Resources/MobiusAdminRelease.entitlements
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    postBuildScripts:
      - script: |
          SERVER_BIN="${SRCROOT}/../mobius-hotline-server"
          if [ -f "$SERVER_BIN" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
            cp "$SERVER_BIN" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/mobius-hotline-server"
            chmod +x "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/mobius-hotline-server"
            # Sign the embedded binary — use the app's signing identity if set, otherwise ad-hoc
            DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/mobius-hotline-server"
            ENTITLEMENTS="${SRCROOT}/MobiusAdmin/Resources/Server.entitlements"
            if [ -n "${EXPANDED_CODE_SIGN_IDENTITY}" ] && [ "${EXPANDED_CODE_SIGN_IDENTITY}" != "-" ]; then
              codesign -s "${EXPANDED_CODE_SIGN_IDENTITY}" -f --options runtime --entitlements "${ENTITLEMENTS}" "${DEST}"
            else
              codesign -s - -f "${DEST}"
            fi
          else
            echo "warning: mobius-hotline-server binary not found at $SERVER_BIN — run 'make server' first"
          fi
        name: Embed Server Binary
